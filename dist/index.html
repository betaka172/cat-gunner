<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Cat Gunner - Shooting Game</title>
    <style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
body{background:#0a0a1a;display:flex;justify-content:center;align-items:center;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
#game-container{position:relative;width:100%;height:100%;max-width:900px;max-height:600px;border:2px solid #1a3a5c;border-radius:4px;box-shadow:0 0 40px rgba(0,100,255,.3),inset 0 0 40px rgba(0,0,0,.5);overflow:hidden}
#gameCanvas{display:block;width:100%;height:100%}
#ui-overlay{position:absolute;top:0;left:0;right:0;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;pointer-events:none;z-index:5}
#score-display,#wave-display{color:#fff;font-size:14px;font-weight:bold;text-shadow:0 0 10px rgba(0,150,255,.8);letter-spacing:2px}
#lives-display{display:flex;gap:4px}
.life-icon{width:18px;height:18px;background:radial-gradient(circle,#ff6b6b,#c0392b);border-radius:50%;border:2px solid #fff;box-shadow:0 0 8px rgba(255,100,100,.6)}
.life-icon.lost{background:#333;border-color:#555;box-shadow:none}
#touch-controls{display:none;position:absolute;bottom:0;left:0;right:0;height:45%;pointer-events:none;z-index:8}
#joystick-zone{position:absolute;left:0;bottom:0;width:50%;height:100%;pointer-events:auto;display:flex;justify-content:center;align-items:center}
#joystick-base{width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);position:relative;display:flex;justify-content:center;align-items:center}
#joystick-thumb{width:48px;height:48px;border-radius:50%;background:radial-gradient(circle,rgba(0,170,255,.6),rgba(0,100,200,.4));border:2px solid rgba(0,170,255,.5);position:absolute;transition:none}
#fire-btn-zone{position:absolute;right:0;bottom:0;width:50%;height:100%;pointer-events:auto;display:flex;justify-content:center;align-items:center}
#fire-btn{width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,rgba(255,80,30,.7),rgba(200,40,10,.5));border:3px solid rgba(255,120,50,.6);color:#fff;font-size:16px;font-weight:bold;letter-spacing:2px;display:flex;justify-content:center;align-items:center;text-shadow:0 0 8px rgba(255,100,50,.8)}
#fire-btn.active{background:radial-gradient(circle,rgba(255,120,50,.9),rgba(255,60,20,.7));border-color:rgba(255,180,80,.8);box-shadow:0 0 20px rgba(255,100,50,.5);transform:scale(.93)}
.screen{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;justify-content:center;align-items:center;background:rgba(0,0,0,.85);z-index:10}
.screen-content{text-align:center;color:#fff;padding:20px}
.game-title{font-size:48px;font-weight:900;letter-spacing:6px;background:linear-gradient(180deg,#00b4ff,#0066cc,#003366);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 20px rgba(0,100,255,.5));margin-bottom:8px}
.subtitle{font-size:14px;color:#8ab4f8;margin-bottom:24px;letter-spacing:3px;font-style:italic}
.controls-info{margin-bottom:24px;display:flex;flex-direction:column;gap:10px;align-items:center}
.control-row{font-size:14px;color:#ccc;display:flex;align-items:center;gap:8px}
kbd{display:inline-block;padding:3px 8px;font-size:13px;font-family:inherit;color:#fff;background:#2a2a3a;border:1px solid #555;border-radius:4px;box-shadow:0 2px 0 #111;min-width:28px;text-align:center}
.game-btn{padding:14px 48px;font-size:18px;font-weight:bold;letter-spacing:4px;color:#fff;background:linear-gradient(180deg,#0077cc,#004488);border:2px solid #00aaff;border-radius:8px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.game-btn:hover{background:linear-gradient(180deg,#0088dd,#005599);box-shadow:0 0 20px rgba(0,150,255,.5);transform:scale(1.05)}
.game-btn:active{transform:scale(.98)}
.gameover-title{font-size:44px;font-weight:900;letter-spacing:5px;color:#ff4444;text-shadow:0 0 30px rgba(255,50,50,.6);margin-bottom:18px}
.final-score{font-size:24px;color:#fff;margin-bottom:8px;letter-spacing:3px}
.high-score{font-size:18px;color:#ffd700;margin-bottom:24px;letter-spacing:2px}
#rotate-prompt{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a1a;z-index:9999;justify-content:center;align-items:center}
.rotate-content{text-align:center;color:#8ab4f8}
.rotate-icon{font-size:64px;margin-bottom:20px;animation:rs 2s ease-in-out infinite}
@keyframes rs{0%,100%{transform:rotate(0)}50%{transform:rotate(90deg)}}
.rotate-content p{font-size:18px;margin-bottom:8px;letter-spacing:1px}
.rotate-sub{font-size:14px!important;color:#6688aa}
@media(min-width:920px)and(min-height:620px){#game-container{border-radius:8px;border-width:3px}#ui-overlay{padding:12px 20px}#score-display,#wave-display{font-size:18px}.life-icon{width:24px;height:24px}#lives-display{gap:6px}.game-title{font-size:64px;letter-spacing:8px}.subtitle{font-size:16px;margin-bottom:32px}.controls-info{margin-bottom:32px;gap:12px}.control-row{font-size:16px}kbd{padding:4px 10px;font-size:14px;min-width:32px}.game-btn{font-size:20px}.gameover-title{font-size:56px;letter-spacing:6px;margin-bottom:24px}.final-score{font-size:28px}.high-score{font-size:20px;margin-bottom:32px}}
@media(max-height:400px){.game-title{font-size:32px;letter-spacing:4px}.subtitle{font-size:11px;margin-bottom:12px}.controls-info{margin-bottom:12px}.control-row{font-size:12px}.game-btn{padding:10px 36px;font-size:15px}.gameover-title{font-size:32px;margin-bottom:12px}.final-score{font-size:20px}.high-score{font-size:15px;margin-bottom:16px}#joystick-base{width:90px;height:90px}#joystick-thumb{width:36px;height:36px}#fire-btn{width:70px;height:70px;font-size:13px}}
@media(max-height:500px)and(orientation:landscape){#touch-controls{height:55%}}
@media(orientation:portrait)and(hover:none)and(pointer:coarse){#rotate-prompt{display:flex}#game-container{display:none}}
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-overlay">
            <div id="score-display">SCORE: <span id="score">0</span></div>
            <div id="lives-display" title="Lives"></div>
            <div id="wave-display">WAVE <span id="wave">1</span></div>
        </div>
        <div id="touch-controls">
            <div id="joystick-zone">
                <div id="joystick-base"><div id="joystick-thumb"></div></div>
            </div>
            <div id="fire-btn-zone"><div id="fire-btn">FIRE</div></div>
        </div>
        <div id="start-screen" class="screen">
            <div class="screen-content">
                <h1 class="game-title">CAT GUNNER</h1>
                <p class="subtitle">Pen is mightier than the sword!</p>
                <div class="controls-info" id="controls-keyboard">
                    <div class="control-row"><kbd>&uarr;</kbd><kbd>&darr;</kbd><kbd>&larr;</kbd><kbd>&rarr;</kbd> Move</div>
                    <div class="control-row"><kbd>SPACE</kbd> Fire Missile</div>
                </div>
                <div class="controls-info" id="controls-touch" style="display:none;">
                    <div class="control-row">Left: Joystick to Move</div>
                    <div class="control-row">Right: Tap to Fire</div>
                </div>
                <button id="start-btn" class="game-btn">START GAME</button>
            </div>
        </div>
        <div id="gameover-screen" class="screen" style="display:none;">
            <div class="screen-content">
                <h1 class="gameover-title">GAME OVER</h1>
                <p class="final-score">SCORE: <span id="final-score">0</span></p>
                <p class="high-score">HIGH SCORE: <span id="high-score">0</span></p>
                <button id="retry-btn" class="game-btn">RETRY</button>
            </div>
        </div>
    </div>
    <div id="rotate-prompt">
        <div class="rotate-content">
            <div class="rotate-icon">&#x1F504;</div>
            <p>Please rotate your device to landscape mode</p>
            <p class="rotate-sub">横向きにしてプレイしてください</p>
        </div>
    </div>
<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const GAME_W=900,GAME_H=600;canvas.width=GAME_W;canvas.height=GAME_H;
const isTouchDevice=('ontouchstart'in window)||navigator.maxTouchPoints>0;
function initControlsDisplay(){if(isTouchDevice){document.getElementById('controls-touch').style.display='flex';document.getElementById('controls-keyboard').style.display='none';document.getElementById('touch-controls').style.display='block'}}
const game={running:false,score:0,highScore:parseInt(localStorage.getItem('catGunnerHighScore')||'0'),lives:3,wave:1,waveTimer:0,waveInterval:1200,enemySpawnTimer:0,enemySpawnInterval:80,starfieldOffset:0,shakeTimer:0,shakeIntensity:0};
const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault()});
window.addEventListener('keyup',e=>{keys[e.code]=false});
const touchState={joystickActive:false,joystickDx:0,joystickDy:0,joystickTouchId:null,fireActive:false,fireTouchId:null};
function initTouchControls(){if(!isTouchDevice)return;const jz=document.getElementById('joystick-zone'),jb=document.getElementById('joystick-base'),jt=document.getElementById('joystick-thumb'),fz=document.getElementById('fire-btn-zone'),fb=document.getElementById('fire-btn');const maxD=40;function gc(){const r=jb.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2}}jz.addEventListener('touchstart',e=>{e.preventDefault();if(touchState.joystickTouchId!==null)return;const t=e.changedTouches[0];touchState.joystickTouchId=t.identifier;touchState.joystickActive=true;uj(t)},{passive:false});jz.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===touchState.joystickTouchId)uj(t)},{passive:false});function ej(e){for(const t of e.changedTouches)if(t.identifier===touchState.joystickTouchId){touchState.joystickActive=false;touchState.joystickDx=0;touchState.joystickDy=0;touchState.joystickTouchId=null;jt.style.transform='translate(0px,0px)'}}jz.addEventListener('touchend',ej);jz.addEventListener('touchcancel',ej);function uj(t){const c=gc();let dx=t.clientX-c.x,dy=t.clientY-c.y;const d=Math.hypot(dx,dy);if(d>maxD){dx=(dx/d)*maxD;dy=(dy/d)*maxD}touchState.joystickDx=dx/maxD;touchState.joystickDy=dy/maxD;jt.style.transform=`translate(${dx}px,${dy}px)`}fz.addEventListener('touchstart',e=>{e.preventDefault();for(const t of e.changedTouches)if(touchState.fireTouchId===null){touchState.fireTouchId=t.identifier;touchState.fireActive=true;fb.classList.add('active')}},{passive:false});function ef(e){for(const t of e.changedTouches)if(t.identifier===touchState.fireTouchId){touchState.fireActive=false;touchState.fireTouchId=null;fb.classList.remove('active')}}fz.addEventListener('touchend',ef);fz.addEventListener('touchcancel',ef);document.addEventListener('contextmenu',e=>e.preventDefault())}
const stars=[];function initStars(){stars.length=0;for(let i=0;i<120;i++)stars.push({x:Math.random()*GAME_W,y:Math.random()*GAME_H,size:Math.random()*2+.5,speed:Math.random()*1.5+.3,brightness:Math.random()*.5+.5})}
const player={x:80,y:300,width:60,height:60,speed:4.5,fireRate:12,fireTimer:0,invincible:0,thrustAnim:0};
let bullets=[],enemies=[],particles=[],powerUps=[],damageFlash=0,enemyBullets=[],rapidFireTimer=0,spreadShotTimer=0;
function drawCat(x,y,w,h,inv){const cx=x+w/2,cy=y+h/2,sc=w/60;ctx.save();ctx.translate(cx,cy);ctx.scale(sc,sc);if(inv>0&&Math.floor(inv/4)%2===0)ctx.globalAlpha=.4;ctx.fillStyle='#2a2a2a';ctx.beginPath();ctx.ellipse(0,8,22,20,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#444';ctx.lineWidth=1;ctx.stroke();ctx.fillStyle='#3a3a3a';ctx.beginPath();ctx.ellipse(0,-4,16,8,0,0,Math.PI);ctx.fill();ctx.strokeStyle='#888';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,-2);ctx.lineTo(0,20);ctx.stroke();ctx.fillStyle='#e74c3c';ctx.beginPath();ctx.arc(8,4,3,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#aaa';ctx.lineWidth=1;ctx.beginPath();ctx.arc(0,-2,10,.2,Math.PI-.2);ctx.stroke();ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(0,8,4,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#666';ctx.lineWidth=1;ctx.stroke();const g=ctx.createRadialGradient(0,-14,4,0,-14,18);g.addColorStop(0,'#c88050');g.addColorStop(.6,'#8B5A2B');g.addColorStop(1,'#5a3518');ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(0,-14,17,16,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#8B5A2B';ctx.beginPath();ctx.moveTo(-14,-24);ctx.lineTo(-8,-34);ctx.lineTo(-4,-24);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(14,-24);ctx.lineTo(8,-34);ctx.lineTo(4,-24);ctx.closePath();ctx.fill();ctx.fillStyle='#d4956b';ctx.beginPath();ctx.moveTo(-12,-25);ctx.lineTo(-8,-31);ctx.lineTo(-6,-25);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(12,-25);ctx.lineTo(8,-31);ctx.lineTo(6,-25);ctx.closePath();ctx.fill();ctx.fillStyle='#5a3518';ctx.beginPath();ctx.moveTo(0,-30);ctx.quadraticCurveTo(-3,-22,0,-16);ctx.quadraticCurveTo(3,-22,0,-30);ctx.fill();ctx.fillStyle='#1a1a2e';ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(-8,-16,9,7,-.1,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.beginPath();ctx.ellipse(8,-16,9,7,.1,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.beginPath();ctx.moveTo(-1,-16);ctx.lineTo(1,-16);ctx.stroke();ctx.fillStyle='rgba(30,120,220,.35)';ctx.beginPath();ctx.ellipse(-8,-16,8,6,-.1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(8,-16,8,6,.1,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.ellipse(-10,-19,3,2,-.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(6,-19,3,2,-.3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#d4776b';ctx.beginPath();ctx.ellipse(0,-8,3,2.5,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#5a3518';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,-6);ctx.quadraticCurveTo(-4,-2,-7,-4);ctx.stroke();ctx.beginPath();ctx.moveTo(0,-6);ctx.quadraticCurveTo(4,-2,7,-4);ctx.stroke();ctx.strokeStyle='#ccc';ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(-10,-9);ctx.lineTo(-24,-13);ctx.stroke();ctx.beginPath();ctx.moveTo(-10,-7);ctx.lineTo(-24,-7);ctx.stroke();ctx.beginPath();ctx.moveTo(-10,-5);ctx.lineTo(-24,-1);ctx.stroke();ctx.beginPath();ctx.moveTo(10,-9);ctx.lineTo(24,-13);ctx.stroke();ctx.beginPath();ctx.moveTo(10,-7);ctx.lineTo(24,-7);ctx.stroke();ctx.beginPath();ctx.moveTo(10,-5);ctx.lineTo(24,-1);ctx.stroke();player.thrustAnim+=.3;const fl=8+Math.sin(player.thrustAnim)*5;const fg=ctx.createLinearGradient(-30,8,-30-fl,8);fg.addColorStop(0,'rgba(255,150,50,.9)');fg.addColorStop(.5,'rgba(255,80,20,.6)');fg.addColorStop(1,'rgba(255,30,10,0)');ctx.fillStyle=fg;ctx.beginPath();ctx.moveTo(-22,2);ctx.lineTo(-22-fl,8);ctx.lineTo(-22,14);ctx.closePath();ctx.fill();ctx.restore()}
function drawBullet(b){ctx.save();ctx.translate(b.x,b.y);const g=ctx.createLinearGradient(0,-3,0,3);g.addColorStop(0,'#4a5568');g.addColorStop(.5,'#2d3748');g.addColorStop(1,'#1a202c');ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(-10,-3,20,6,2);ctx.fill();ctx.fillStyle='#c0c0c0';ctx.beginPath();ctx.moveTo(10,-2);ctx.lineTo(16,0);ctx.lineTo(10,2);ctx.closePath();ctx.fill();ctx.fillStyle='#718096';ctx.fillRect(-6,-4,4,1);ctx.globalAlpha=.3;ctx.fillStyle='#00aaff';ctx.beginPath();ctx.ellipse(-8,0,6,3,0,0,Math.PI*2);ctx.fill();ctx.restore()}
function createEnemy(t){const bY=40+Math.random()*(GAME_H-80);switch(t){case'drone':return{type:'drone',x:GAME_W+30,y:bY,width:36,height:36,speed:1.8+game.wave*.15,hp:1,maxHp:1,score:100,animTimer:Math.random()*Math.PI*2,movePattern:'sine',baseY:bY};case'tank':return{type:'tank',x:GAME_W+30,y:bY,width:48,height:40,speed:1+game.wave*.08,hp:3,maxHp:3,score:300,animTimer:Math.random()*Math.PI*2,movePattern:'straight',baseY:bY};case'fast':return{type:'fast',x:GAME_W+30,y:bY,width:28,height:28,speed:3.5+game.wave*.2,hp:1,maxHp:1,score:150,animTimer:Math.random()*Math.PI*2,movePattern:'zigzag',baseY:bY};case'boss':return{type:'boss',x:GAME_W+40,y:GAME_H/2,width:80,height:70,speed:.5,hp:15+game.wave*5,maxHp:15+game.wave*5,score:2000,animTimer:0,movePattern:'boss',baseY:GAME_H/2,shootTimer:0};default:return createEnemy('drone')}}
function drawEnemy(e){ctx.save();ctx.translate(e.x,e.y);e.animTimer+=.05;const hf=e.hitFlash>0;if(hf)e.hitFlash--;if(e.type==='drone'){ctx.fillStyle=hf?'#fff':'#8e44ad';ctx.beginPath();ctx.ellipse(0,0,18,10,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=hf?'#fff':'#9b59b6';ctx.beginPath();ctx.ellipse(0,-3,10,8,0,Math.PI,Math.PI*2);ctx.fill();ctx.fillStyle=hf?'#fff':'rgba(180,130,255,.6)';ctx.beginPath();ctx.ellipse(0,-6,6,6,0,Math.PI,Math.PI*2);ctx.fill();ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(0,-1,3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#f00';ctx.beginPath();ctx.arc(0,-1,1.5,0,Math.PI*2);ctx.fill();for(let i=-2;i<=2;i++){ctx.fillStyle=`hsl(${(e.animTimer*100+i*60)%360},100%,70%)`;ctx.beginPath();ctx.arc(i*6,4,2,0,Math.PI*2);ctx.fill()}}else if(e.type==='tank'){ctx.fillStyle=hf?'#fff':'#c0392b';ctx.beginPath();ctx.moveTo(-24,0);ctx.lineTo(-16,-16);ctx.lineTo(16,-16);ctx.lineTo(24,-8);ctx.lineTo(24,8);ctx.lineTo(16,16);ctx.lineTo(-16,16);ctx.closePath();ctx.fill();ctx.strokeStyle=hf?'#fff':'#e74c3c';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle=hf?'#fff':'#922b21';ctx.fillRect(-14,-12,28,4);ctx.fillRect(-14,8,28,4);ctx.fillStyle='#ff6b6b';const p=3+Math.sin(e.animTimer*2)*1.5;ctx.beginPath();ctx.arc(0,0,p,0,Math.PI*2);ctx.fill();if(e.hp<e.maxHp){ctx.fillStyle='#333';ctx.fillRect(-20,-22,40,4);ctx.fillStyle='#2ecc71';ctx.fillRect(-20,-22,40*(e.hp/e.maxHp),4)}}else if(e.type==='fast'){ctx.fillStyle=hf?'#fff':'#e67e22';ctx.beginPath();ctx.moveTo(14,0);ctx.lineTo(-10,-12);ctx.lineTo(-6,0);ctx.lineTo(-10,12);ctx.closePath();ctx.fill();ctx.globalAlpha=.4;ctx.fillStyle='#f39c12';ctx.beginPath();ctx.ellipse(10,0,4+Math.sin(e.animTimer*3)*2,3,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}else if(e.type==='boss'){const bp=Math.sin(e.animTimer)*.05;ctx.scale(1+bp,1+bp);ctx.fillStyle=hf?'#fff':'#1a1a2e';ctx.beginPath();ctx.moveTo(-40,0);ctx.lineTo(-30,-28);ctx.lineTo(10,-30);ctx.lineTo(35,-15);ctx.lineTo(40,0);ctx.lineTo(35,15);ctx.lineTo(10,30);ctx.lineTo(-30,28);ctx.closePath();ctx.fill();ctx.strokeStyle=hf?'#fff':'#6c3483';ctx.lineWidth=3;ctx.stroke();ctx.strokeStyle='#8e44ad';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(-25,-20);ctx.lineTo(25,-10);ctx.stroke();ctx.beginPath();ctx.moveTo(-25,20);ctx.lineTo(25,10);ctx.stroke();ctx.fillStyle='#e74c3c';ctx.beginPath();ctx.arc(-5,-10,6,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(-5,10,6,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-5,-10,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(-5,10,3,0,Math.PI*2);ctx.fill();const cg=5+Math.sin(e.animTimer*3)*3;ctx.fillStyle=`rgba(255,50,50,${.3+Math.sin(e.animTimer*3)*.2})`;ctx.beginPath();ctx.arc(38,0,cg,0,Math.PI*2);ctx.fill();ctx.fillStyle='#333';ctx.fillRect(-35,-38,70,6);ctx.fillStyle=e.hp/e.maxHp>.3?'#2ecc71':'#e74c3c';ctx.fillRect(-35,-38,70*(e.hp/e.maxHp),6);ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(-35,-38,70,6)}ctx.restore()}
function spawnExplosion(x,y,c,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*4+1;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:30+Math.random()*20,maxLife:30+Math.random()*20,size:Math.random()*4+1,color:c})}}
function spawnScorePopup(x,y,s){particles.push({x,y,vx:0,vy:-1.5,life:40,maxLife:40,size:0,color:'#ffd700',text:`+${s}`,isText:true})}
function spawnPowerUp(x,y){if(Math.random()>.15)return;const ts=['rapid','heal','spread'];powerUps.push({x,y,type:ts[Math.floor(Math.random()*ts.length)],width:24,height:24,life:300,animTimer:0})}
function drawPowerUp(p){ctx.save();ctx.translate(p.x,p.y);p.animTimer+=.08;ctx.translate(0,Math.sin(p.animTimer)*3);ctx.globalAlpha=.3+Math.sin(p.animTimer)*.1;const c={rapid:'#00aaff',heal:'#2ecc71',spread:'#f39c12'};ctx.fillStyle=c[p.type];ctx.beginPath();ctx.arc(0,0,16,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;ctx.fillStyle=c[p.type];ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#fff';ctx.font='bold 12px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText({rapid:'R',heal:'+',spread:'S'}[p.type],0,0);ctx.restore()}
function drawEnemyBullet(b){ctx.save();ctx.translate(b.x,b.y);ctx.fillStyle='#ff4444';ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,100,100,.4)';ctx.beginPath();ctx.arc(0,0,8,0,Math.PI*2);ctx.fill();ctx.restore()}
function rectCollision(a,b){return a.x-a.width/2<b.x+b.width/2&&a.x+a.width/2>b.x-b.width/2&&a.y-a.height/2<b.y+b.height/2&&a.y+a.height/2>b.y-b.height/2}
function update(){if(!game.running)return;game.starfieldOffset+=.5;let mx=0,my=0;if(keys['ArrowUp']||keys['KeyW'])my-=1;if(keys['ArrowDown']||keys['KeyS'])my+=1;if(keys['ArrowLeft']||keys['KeyA'])mx-=1;if(keys['ArrowRight']||keys['KeyD'])mx+=1;if(touchState.joystickActive){mx+=touchState.joystickDx;my+=touchState.joystickDy}const mm=Math.hypot(mx,my);if(mm>.15){const n=Math.min(mm,1);player.x+=(mx/mm)*n*player.speed;player.y+=(my/mm)*n*player.speed}player.x=Math.max(player.width/2,Math.min(GAME_W-player.width/2,player.x));player.y=Math.max(player.height/2,Math.min(GAME_H-player.height/2,player.y));if(player.fireTimer>0)player.fireTimer--;if(rapidFireTimer>0)rapidFireTimer--;if(spreadShotTimer>0)spreadShotTimer--;const cfr=rapidFireTimer>0?4:player.fireRate;if((keys['Space']||touchState.fireActive)&&player.fireTimer<=0){player.fireTimer=cfr;if(spreadShotTimer>0){for(let a=-.2;a<=.2;a+=.2)bullets.push({x:player.x+30,y:player.y,vx:8*Math.cos(a),vy:8*Math.sin(a),width:16,height:6})}else bullets.push({x:player.x+30,y:player.y,vx:8,vy:0,width:16,height:6})}bullets=bullets.filter(b=>{b.x+=b.vx;b.y+=b.vy;return b.x<GAME_W+20&&b.x>-20&&b.y>-20&&b.y<GAME_H+20});game.enemySpawnTimer++;game.waveTimer++;const sr=Math.max(30,game.enemySpawnInterval-game.wave*5);if(game.enemySpawnTimer>=sr){game.enemySpawnTimer=0;const r=Math.random();if(r<.5)enemies.push(createEnemy('drone'));else if(r<.75)enemies.push(createEnemy('fast'));else enemies.push(createEnemy('tank'))}if(game.waveTimer>=game.waveInterval){game.waveTimer=0;game.wave++;document.getElementById('wave').textContent=game.wave;if(game.wave%3===0)enemies.push(createEnemy('boss'))}enemies=enemies.filter(e=>{e.x-=e.speed;if(e.movePattern==='sine')e.y=e.baseY+Math.sin(e.animTimer*2)*30;else if(e.movePattern==='zigzag')e.y=e.baseY+Math.sin(e.animTimer*4)*50;else if(e.movePattern==='boss'){if(e.x<GAME_W-100)e.x=GAME_W-100;e.y=GAME_H/2+Math.sin(e.animTimer*.8)*150;e.shootTimer++;if(e.shootTimer>=30){e.shootTimer=0;const a=Math.atan2(player.y-e.y,player.x-e.x);enemyBullets.push({x:e.x-40,y:e.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4})}}if(e.x<-60)return false;for(let i=bullets.length-1;i>=0;i--){if(rectCollision(bullets[i],e)){e.hp--;e.hitFlash=6;bullets.splice(i,1);spawnExplosion(e.x,e.y,'#ff8800',4);if(e.hp<=0){game.score+=e.score;document.getElementById('score').textContent=game.score;spawnExplosion(e.x,e.y,e.type==='boss'?'#ff00ff':'#ff4400',e.type==='boss'?40:15);spawnScorePopup(e.x,e.y,e.score);spawnPowerUp(e.x,e.y);if(e.type==='boss'){game.shakeTimer=20;game.shakeIntensity=8}return false}break}}if(player.invincible<=0){const pr={x:player.x,y:player.y,width:player.width*.6,height:player.height*.6};if(rectCollision(pr,e)){takeDamage();return e.type==='boss'}}return true});enemyBullets=enemyBullets.filter(b=>{b.x+=b.vx;b.y+=b.vy;if(b.x<-20||b.x>GAME_W+20||b.y<-20||b.y>GAME_H+20)return false;if(player.invincible<=0&&Math.hypot(b.x-player.x,b.y-player.y)<20){takeDamage();return false}return true});powerUps=powerUps.filter(p=>{p.life--;if(p.life<=0)return false;if(Math.hypot(p.x-player.x,p.y-player.y)<30){if(p.type==='rapid')rapidFireTimer=300;else if(p.type==='heal'){game.lives=Math.min(5,game.lives+1);updateLivesDisplay()}else if(p.type==='spread')spreadShotTimer=300;spawnExplosion(p.x,p.y,'#ffd700',10);return false}return true});particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;if(!p.isText){p.vx*=.96;p.vy*=.96}return p.life>0});if(player.invincible>0)player.invincible--;if(damageFlash>0)damageFlash--;if(game.shakeTimer>0)game.shakeTimer--}
function takeDamage(){game.lives--;player.invincible=90;damageFlash=10;game.shakeTimer=10;game.shakeIntensity=5;spawnExplosion(player.x,player.y,'#ff0000',12);updateLivesDisplay();if(game.lives<=0)gameOver()}
function draw(){ctx.save();if(game.shakeTimer>0){const s=game.shakeIntensity*(game.shakeTimer/20);ctx.translate((Math.random()-.5)*s,(Math.random()-.5)*s)}const bg=ctx.createLinearGradient(0,0,0,GAME_H);bg.addColorStop(0,'#0a0a2e');bg.addColorStop(.5,'#0d1b3e');bg.addColorStop(1,'#0a0a2e');ctx.fillStyle=bg;ctx.fillRect(0,0,GAME_W,GAME_H);stars.forEach(s=>{s.x-=s.speed;if(s.x<0){s.x=GAME_W;s.y=Math.random()*GAME_H}const tw=.5+Math.sin(s.x*.01+game.starfieldOffset*.05)*.3;ctx.globalAlpha=s.brightness*tw;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.size,0,Math.PI*2);ctx.fill()});ctx.globalAlpha=1;if(damageFlash>0){ctx.fillStyle=`rgba(255,0,0,${damageFlash*.03})`;ctx.fillRect(0,0,GAME_W,GAME_H)}powerUps.forEach(drawPowerUp);enemyBullets.forEach(drawEnemyBullet);enemies.forEach(drawEnemy);bullets.forEach(drawBullet);drawCat(player.x-player.width/2,player.y-player.height/2,player.width,player.height,player.invincible);if(rapidFireTimer>0||spreadShotTimer>0){ctx.font='12px monospace';ctx.textAlign='left';let iy=GAME_H-20;if(rapidFireTimer>0){ctx.fillStyle='#00aaff';ctx.fillText(`RAPID FIRE: ${Math.ceil(rapidFireTimer/60)}s`,10,iy);iy-=18}if(spreadShotTimer>0){ctx.fillStyle='#f39c12';ctx.fillText(`SPREAD SHOT: ${Math.ceil(spreadShotTimer/60)}s`,10,iy)}}particles.forEach(p=>{const a=p.life/p.maxLife;ctx.globalAlpha=a;if(p.isText){ctx.fillStyle=p.color;ctx.font='bold 16px monospace';ctx.textAlign='center';ctx.fillText(p.text,p.x,p.y)}else{ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);ctx.fill()}});ctx.globalAlpha=1;ctx.restore()}
function updateLivesDisplay(){const c=document.getElementById('lives-display');c.innerHTML='';for(let i=0;i<5;i++){const d=document.createElement('div');d.className='life-icon'+(i>=game.lives?' lost':'');c.appendChild(d)}}
function startGame(){game.running=true;game.score=0;game.lives=3;game.wave=1;game.waveTimer=0;game.enemySpawnTimer=0;player.x=80;player.y=GAME_H/2;player.invincible=60;bullets=[];enemies=[];particles=[];powerUps=[];enemyBullets=[];rapidFireTimer=0;spreadShotTimer=0;damageFlash=0;game.shakeTimer=0;document.getElementById('score').textContent='0';document.getElementById('wave').textContent='1';updateLivesDisplay();document.getElementById('start-screen').style.display='none';document.getElementById('gameover-screen').style.display='none'}
function gameOver(){game.running=false;if(game.score>game.highScore){game.highScore=game.score;localStorage.setItem('catGunnerHighScore',game.highScore.toString())}document.getElementById('final-score').textContent=game.score;document.getElementById('high-score').textContent=game.highScore;document.getElementById('gameover-screen').style.display='flex'}
function gameLoop(){update();draw();requestAnimationFrame(gameLoop)}
initStars();updateLivesDisplay();initControlsDisplay();initTouchControls();
document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('retry-btn').addEventListener('click',startGame);
window.addEventListener('keydown',e=>{if(e.code==='Enter'||e.code==='Space'){const ss=document.getElementById('start-screen'),gs=document.getElementById('gameover-screen');if(ss.style.display!=='none'&&getComputedStyle(ss).display!=='none'){e.preventDefault();startGame()}else if(gs.style.display==='flex'){e.preventDefault();startGame()}}});
document.addEventListener('touchmove',e=>{if(e.touches.length>1)e.preventDefault()},{passive:false});
gameLoop();
</script>
</body>
